<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>35元快速改稿海报</title>
  <style>
    :root {
      --green: #08c160;
      --ink: #111827;
      --muted: #586174;
      --line: #dce2ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }

    .poster {
      width: min(100vw, 720px);
      aspect-ratio: 3 / 4;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: 44px 44px 36px;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .tag {
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(8, 193, 96, 0.11);
      color: #057f41;
      font-size: 22px;
      font-weight: 800;
    }

    h1 {
      margin: 18px 0 16px;
      font-size: clamp(42px, 8vw, 74px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(21px, 3vw, 30px);
      line-height: 1.55;
      font-weight: 600;
    }

    .body {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 24px;
      align-items: center;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 14px;
    }

    li {
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 24px;
      font-weight: 700;
    }

    .qr {
      display: grid;
      gap: 12px;
      text-align: center;
    }

    .qr img {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .qr p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.4;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
    }

    .price {
      color: var(--green);
      font-size: 42px;
      font-weight: 900;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .poster {
        width: 100vw;
        min-height: 100vh;
        aspect-ratio: auto;
        padding: 28px 20px;
      }

      .body {
        grid-template-columns: 1fr;
      }

      .qr {
        width: min(280px, 70vw);
        margin: 0 auto;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="poster">
    <header>
      <div class="tag">今日接小单</div>
      <h1>35元快速改稿</h1>
      <p class="subtitle">有内容但不顺、不好卖、不够专业，我帮你改成一版能直接用的文字。</p>
    </header>

    <section class="body">
      <ul>
        <li>商品标题 + 卖点</li>
        <li>英文邮件润色</li>
        <li>简历片段优化</li>
        <li>截图/表格整理</li>
      </ul>
      <div class="qr">
        <img src="assets/wechat-pay.png" alt="微信支付收款码">
        <p>先发任务确认<br>能做再付款</p>
      </div>
    </section>

    <footer class="footer">
      <span>先发任务确认，能做再付款。10-30 分钟返回一版。</span>
      <span class="price">35 元</span>
    </footer>
  </main>
</body>
</html>

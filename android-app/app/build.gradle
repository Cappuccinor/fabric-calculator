plugins {
    id "com.android.application"
}

android {
    namespace "com.greyfabric.calculator"
    compileSdk 35

    defaultConfig {
        applicationId "com.greyfabric.calculator"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
